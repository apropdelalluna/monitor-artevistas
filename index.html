<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Artevistas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c9a84c;
      --accent-dim: #8a6f2e;
      --text: #e8e4dc;
      --text-dim: #888;
      --sold: #e05252;
      --new: #52a870;
      --reserved: #e09352;
      --disappeared: #e09352;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
      margin-bottom: 40px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #52a870;
      animation: pulse 2s infinite;
    }

    .status-dot.loading {
      background: var(--accent);
    }

    .status-dot.error {
      background: var(--sold);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-dim);
    }

    .wake-btn {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .wake-btn:hover {
      background: #fff;
    }

    .wake-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .card-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }

    .card-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section {
      margin-bottom: 40px;
    }

    .historial-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .historial-table th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }

    .historial-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .historial-table tr:last-child td {
      border-bottom: none;
    }

    .historial-table .mes-actual td {
      color: var(--accent);
    }

    .amount {
      text-align: right;
      font-weight: 500;
    }

    .cambios-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cambio-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      padding: 16px;
    }

    .cambio-item.vendida { border-left-color: var(--sold); }
    .cambio-item.nueva { border-left-color: var(--new); }
    .cambio-item.reserved { border-left-color: var(--reserved); }
    .cambio-item.desaparecida { border-left-color: var(--disappeared); }

    .cambio-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .cambio-artista {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
    }

    .cambio-fecha {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .cambio-obra {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
      margin-right: 6px;
      font-weight: 500;
    }

    .badge.vendida { background: rgba(224,82,82,0.15); color: var(--sold); }
    .badge.nueva { background: rgba(82,168,112,0.15); color: var(--new); }
    .badge.reserved { background: rgba(224,147,82,0.15); color: var(--reserved); }
    .badge.desaparecida { background: rgba(224,147,82,0.15); color: var(--disappeared); }

    .cambio-precio {
      font-size: 13px;
      color: var(--accent);
      margin-top: 4px;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .loading-text {
      color: var(--text-dim);
      font-size: 12px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .last-update {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #000;
      padding: 12px 20px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="container">

    <header>
      <div class="logo">Arte<span>vistas</span> Monitor</div>
      <div class="subtitle">Panel de control · artevistas.eu</div>
      <a href="ventas.html" style="display:inline-block;margin-top:8px;font-size:11px;color:var(--accent);text-decoration:none;letter-spacing:1px;">📊 Ventas totales por artista →</a>
      <div class="status-bar">
        <div class="status-dot loading" id="statusDot"></div>
        <span class="status-text" id="statusText">Cargando datos...</span>
        <button class="wake-btn" id="wakeBtn" onclick="despertarServicio()">⚡ Despertar servicio</button>
      </div>
      <div style="text-align:right; font-size:11px; color:var(--text-dim); margin-top:6px;" id="lastUpdateHeader">—</div>
    </header>

    <div class="grid">
      <div class="card">
        <div class="card-label">Ventas del mes</div>
        <div class="card-value" id="totalMes">—</div>
        <div class="card-sub" id="obrasMes">Cargando...</div>
      </div>
      <div class="card">
        <div class="card-label">En reserva</div>
        <div class="card-value" style="font-size:36px;" id="ultimoCambio">—</div>
        <div class="card-sub" id="ultimoCambioSub">Cargando...</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Historial mensual</div>
      <div id="historialContainer"><span class="loading-text">Cargando...</span></div>
    </div>

    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border);cursor:pointer;" onclick="toggleSection('vendidas')">
        <div class="section-title" style="border:none;padding:0;margin:0;" id="vendidasTitle">Obras vendidas</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:11px;color:var(--text-dim);" id="vendidasMeta"></span>
          <span style="font-size:20px;color:var(--text-dim);" id="vendidasArrow">▸</span>
        </div>
      </div>
      <div class="cambios-list" id="vendidasList" style="margin-top:12px;display:none;"><span class="loading-text">Cargando...</span></div>
    </div>

    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid var(--border);cursor:pointer;" onclick="toggleSection('reservas')">
        <div class="section-title" style="border:none;padding:0;margin:0;">Obras en reserva</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:11px;color:var(--text-dim);" id="reservasMeta"></span>
          <span style="font-size:20px;color:var(--text-dim);" id="reservasArrow">▸</span>
        </div>
      </div>
      <div id="reservasList" style="margin-top:12px;display:none;"><span class="loading-text">Cargando...</span></div>
    </div>

    <div class="section">
      <div class="section-title">Últimos cambios detectados</div>
      <div class="cambios-list" id="cambiosList"><span class="loading-text">Cargando...</span></div>
    </div>

    <div class="last-update" id="lastUpdate">—</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GITHUB_USER = 'apropdelalluna';
    const GITHUB_REPO = 'monitor-artevistas';
    const DEPLOY_HOOK = 'https://api.render.com/deploy/srv-d7nlgg4vikkc73bbl4a0?key=2VdRzr0fB5A';

    const MESES_ES = {
      'January':'Enero','February':'Febrero','March':'Marzo','April':'Abril',
      'May':'Mayo','June':'Junio','July':'Julio','August':'Agosto',
      'September':'Septiembre','October':'Octubre','November':'Noviembre','December':'Diciembre'
    };

    function mesEnEspanol(str) {
      return str.replace(/January|February|March|April|May|June|July|August|September|October|November|December/g,
        m => MESES_ES[m] || m);
    }

    function formatMes(yyyymm) {
      const [y, m] = yyyymm.split('-');
      const fecha = new Date(y, m - 1, 1);
      const nombre = fecha.toLocaleString('en-US', { month: 'long' });
      return MESES_ES[nombre] + ' ' + y;
    }

    function formatNum(n) {
      return n.toLocaleString('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' €';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function fetchGitHub(file) {
      const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${file}?t=${Date.now()}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('No encontrado');
      return r.json();
    }

    async function cargarDatos() {
      try {
        const [ventas, historial, meta] = await Promise.all([
          fetchGitHub('ventas_mensuales.json'),
          fetchGitHub('historial_cambios.json'),
          fetchGitHub('meta.json')
        ]);

        // Última comprobación en Artevistas
        const ultimaComp = meta?.ultima_comprobacion || '—';
        document.getElementById('lastUpdateHeader').textContent = `Última visita a Artevistas: ${ultimaComp}`;

        // Mes actual
        const ahora = new Date();
        const mesActual = `${ahora.getFullYear()}-${String(ahora.getMonth()+1).padStart(2,'0')}`;
        const ventasMes = ventas[mesActual] || [];

        // Calcular obras actualmente RESERVED desde el historial
        // Una obra está en reserva si aparece como RESERVED y no tiene una entrada posterior como vendida/desaparecida
        let totalReserved = 0;
        let numReserved = 0;
        const obrasReserved = {};

        historial.forEach(c => {
          const esReserved = c.obra.toLowerCase().includes('reserved');
          const obraBase = c.obra.replace(/\s*\(RESERVED\)/i, '').trim();
          
          if (esReserved && c.tipo === 'nueva') {
            obrasReserved[obraBase] = { precio_num: c.precio_num || 0, artista: c.artista };
          } else if (!esReserved && (c.tipo === 'vendida' || c.tipo === 'desaparecida' || c.tipo === 'nueva_vendida')) {
            // Si la obra base aparece como vendida/desaparecida, ya no está en reserva
            delete obrasReserved[obraBase];
          }
        });

        Object.values(obrasReserved).forEach(obra => {
          totalReserved += obra.precio_num;
          numReserved++;
        });

        // Vendidas del mes (sin RESERVED ni desaparecidas)
        const ventasReales = ventasMes.filter(v => !v.obra.includes('RESERVED') && v.tipo !== 'desaparecida');
        const totalMes = ventasReales.reduce((s, v) => s + (v.precio_num || 0), 0);
        const numObras = ventasReales.length;

        document.getElementById('totalMes').textContent = formatNum(totalMes);
        document.getElementById('obrasMes').innerHTML = `
          ${numObras} obra${numObras !== 1 ? 's' : ''} vendida${numObras !== 1 ? 's' : ''} en ${formatMes(mesActual)}
        `;

        // Historial mensual con obras por mes
        const meses = Object.keys(ventas).sort().reverse();
        let historialHTML = '';
        
        meses.forEach(mes => {
          const vs = ventas[mes].filter(v => !v.obra.includes('RESERVED') && v.tipo !== 'desaparecida');
          const total = vs.reduce((s, v) => s + (v.precio_num || 0), 0);
          const esMesActual = mes === mesActual;
          const nombreMes = formatMes(mes);
          
          historialHTML += `<div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border);">
              <div>
                <span style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;${esMesActual ? 'color:var(--new)' : ''}">${nombreMes}${esMesActual ? ' ·' : ''}</span>
                <span style="font-size:11px;color:var(--text-dim);margin-left:8px;">${vs.length} obra${vs.length !== 1 ? 's' : ''}</span>
              </div>
              <span style="font-size:14px;font-weight:500;">${formatNum(total)}</span>
            </div>`;
          
          vs.forEach(v => {
            const nombreObra = v.obra.replace(/^[^–—-]*[–—-]\s*/, '');
            historialHTML += `<div style="display:flex;justify-content:space-between;padding:8px 0 8px 16px;border-bottom:1px solid var(--border);font-size:13px;">
              <span style="color:var(--text-dim);">${v.obra}</span>
              <span style="font-weight:500;">${formatNum(v.precio_num || 0)}</span>
            </div>`;
          });

          historialHTML += '</div>';
        });

        document.getElementById('historialContainer').innerHTML = historialHTML || '<div class="empty">Sin datos</div>';

        // Obras vendidas del mes actual
        const nombreMesActual = formatMes(mesActual);
        document.getElementById('vendidasTitle').textContent = `Obras vendidas en ${nombreMesActual}`;
        document.getElementById('vendidasMeta').textContent = `${ventasReales.length} obra${ventasReales.length !== 1 ? 's' : ''} · ${formatNum(totalMes)}`;
        
        if (ventasReales.length === 0) {
          document.getElementById('vendidasList').innerHTML = '<div class="empty">Sin obras vendidas este mes</div>';
        } else {
          let vendidasHTML = '';
          ventasReales.forEach(v => {
            const artista = v.artista || '';
            vendidasHTML += `<div class="cambio-item vendida">
              <div class="cambio-header">
                <div class="cambio-artista">${artista}</div>
              </div>
              <div class="cambio-obra">
                <span class="badge vendida">🔴 Vendida</span>${v.obra}
              </div>
              ${v.precio_num ? `<div class="cambio-precio">${formatNum(v.precio_num)}</div>` : ''}
            </div>`;
          });
          document.getElementById('vendidasList').innerHTML = vendidasHTML;
        }

        // Últimos cambios
        const cambiosRecientes = [...historial].reverse().slice(0, 20);

        document.getElementById('ultimoCambio').textContent = formatNum(totalReserved);
        document.getElementById('ultimoCambioSub').textContent = `${numReserved} obra${numReserved !== 1 ? 's' : ''} actualmente reservada${numReserved !== 1 ? 's' : ''}`;

        // Obras en reserva detalladas
        document.getElementById('reservasMeta').textContent = `${numReserved} obra${numReserved !== 1 ? 's' : ''} · ${formatNum(totalReserved)}`;
        if (Object.keys(obrasReserved).length === 0) {
          document.getElementById('reservasList').innerHTML = '<div class="empty">Sin obras en reserva actualmente</div>';
        } else {
          let reservasHTML = '';
          Object.entries(obrasReserved).forEach(([obra, datos]) => {
            reservasHTML += `<div class="cambio-item reserved">
              <div class="cambio-header">
                <div class="cambio-artista">${datos.artista}</div>
              </div>
              <div class="cambio-obra">
                <span class="badge reserved">🟡 Reserved</span>${obra}
              </div>
              ${datos.precio_num ? `<div class="cambio-precio">${formatNum(datos.precio_num)}</div>` : ''}
            </div>`;
          });
          document.getElementById('reservasList').innerHTML = reservasHTML;
        }
        
        if (cambiosRecientes.length === 0) {
          document.getElementById('cambiosList').innerHTML = '<div class="empty">Sin cambios registrados aún</div>';
        } else {
          let cambiosHTML = '';
          cambiosRecientes.forEach(c => {
            const tipo = c.tipo || 'desaparecida';
            
            // No mostrar desaparecidas
            if (tipo === 'desaparecida') return;

            const tipoLabel = {
              'vendida': '🔴 Vendida',
              'nueva': '🟢 Nueva',
              'nueva_vendida': '🔴🟢 Nueva vendida',
            }[tipo] || tipo;
            
            const esReserved = c.obra.includes('RESERVED');
            const claseItem = esReserved ? 'reserved' : tipo;

            cambiosHTML += `<div class="cambio-item ${claseItem}">
              <div class="cambio-header">
                <div class="cambio-artista">${c.artista}</div>
                <div class="cambio-fecha">${c.fecha}</div>
              </div>
              <div class="cambio-obra">
                <span class="badge ${claseItem}">${esReserved ? '🟡 Reserved' : tipoLabel}</span>
                ${c.obra}
              </div>
              ${c.precio ? `<div class="cambio-precio">${c.precio}</div>` : ''}
            </div>`;
          });

          document.getElementById('cambiosList').innerHTML = cambiosHTML;
        }

        // Status
        document.getElementById('statusDot').className = 'status-dot';
        document.getElementById('statusText').textContent = `Datos actualizados · ${historial.length} cambios registrados`;
        const ahora_str = new Date().toLocaleString('es-ES');
        document.getElementById('lastUpdate').textContent = `Última actualización local: ${ahora_str}`;

      } catch (e) {
        document.getElementById('statusDot').className = 'status-dot error';
        document.getElementById('statusText').textContent = 'Error al cargar datos';
        console.error(e);
      }
    }

    async function despertarServicio() {
      const btn = document.getElementById('wakeBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Despertando...';
      document.getElementById('statusDot').className = 'status-dot loading';
      document.getElementById('statusText').textContent = 'Despertando el servicio...';

      try {
        await fetch(DEPLOY_HOOK, { method: 'POST', mode: 'no-cors' });
        showToast('✅ Servicio despertado. El email llegará en ~15 min.');
        btn.textContent = '✅ Despertado';
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = '⚡ Despertar servicio';
          cargarDatos();
        }, 30000);
      } catch (e) {
        showToast('❌ Error al despertar el servicio');
        btn.disabled = false;
        btn.textContent = '⚡ Despertar servicio';
      }
    }

    function toggleSection(id) {
      const content = document.getElementById(id + 'List');
      const arrow = document.getElementById(id + 'Arrow');
      const isOpen = content.style.display !== 'none';
      content.style.display = isOpen ? 'none' : 'block';
      arrow.textContent = isOpen ? '▸' : '▾';
    }

    cargarDatos();

    // Recargar datos cada 2 minutos automáticamente
    setInterval(cargarDatos, 2 * 60 * 1000);
  </script>
</body>
</html>
