<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas Totales · Artevistas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c9a84c;
      --text: #e8e4dc;
      --text-dim: #888;
      --new: #52a870;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .grain {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
      margin-bottom: 40px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .nav-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-link:hover { color: var(--text); }

    .meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .artista-item {
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .artista-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .artista-header:hover .artista-nombre {
      color: var(--accent);
    }

    .artista-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      transition: color 0.2s;
    }

    .artista-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .artista-total {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
    }

    .artista-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    .artista-arrow {
      font-size: 18px;
      color: var(--text-dim);
      transition: transform 0.2s;
    }

    .artista-arrow.open {
      transform: rotate(180deg);
    }

    .artista-obras {
      display: none;
      padding-bottom: 12px;
    }

    .artista-obras.open {
      display: block;
    }

    .obra-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0 6px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .obra-row:last-child { border-bottom: none; }

    .obra-titulo { color: var(--text-dim); }
    .obra-precio { color: var(--text); font-weight: 500; }

    .empty {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .loading-text {
      color: var(--text-dim);
      font-size: 12px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .grand-total {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grand-total-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .grand-total-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }

    .last-update {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="container">

    <header>
      <div class="logo">Arte<span>vistas</span> Monitor</div>
      <div class="subtitle">Ventas totales por artista</div>
      <a href="index.html" class="nav-link">← Volver al panel</a>
    </header>

    <div id="grandTotalBox" class="grand-total" style="display:none;">
      <div class="grand-total-label">Total vendido (todos los artistas)</div>
      <div class="grand-total-value" id="grandTotal">—</div>
    </div>

    <div class="section-title">Artistas · ordenados por total vendido</div>
    <div id="listaArtistas"><span class="loading-text">Cargando datos...</span></div>

    <div class="last-update" id="lastUpdate">—</div>

  </div>

  <script>
    const GITHUB_USER = 'apropdelalluna';
    const GITHUB_REPO = 'monitor-artevistas';

    function formatNum(n) {
      return n.toLocaleString('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' €';
    }

    async function fetchGitHub(file) {
      const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${file}?t=${Date.now()}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('No encontrado');
      return r.json();
    }

    function toggleArtista(id) {
      const obras = document.getElementById('obras-' + id);
      const arrow = document.getElementById('arrow-' + id);
      const isOpen = obras.classList.contains('open');
      obras.classList.toggle('open', !isOpen);
      arrow.classList.toggle('open', !isOpen);
    }

    const _ordenState = {};
    function toggleOrden(id) {
      _ordenState[id] = _ordenState[id] === 'nombre' ? 'precio' : 'nombre';
      const btn = document.getElementById('btn-orden-' + id);
      const contenedor = document.getElementById('detalle-' + id);
      const rows = Array.from(contenedor.querySelectorAll('.obra-row'));
      if (_ordenState[id] === 'nombre') {
        const getKey = el => {
          const t = el.querySelector('.obra-titulo').textContent;
          const parts = t.split('–');
          return (parts.length > 1 ? parts.slice(1).join('–') : t).trim().toLowerCase().replace(/[^a-z0-9áéíóúàèìòùüñç]/gi, ' ').trim();
        };
        rows.sort((a, b) => getKey(a).localeCompare(getKey(b), 'es'));
        btn.textContent = '↕ Por nombre';
      } else {
        rows.sort((a, b) => {
          const pa = parseFloat(a.querySelector('.obra-precio').textContent.replace(/[^\d]/g, '')) || 0;
          const pb = parseFloat(b.querySelector('.obra-precio').textContent.replace(/[^\d]/g, '')) || 0;
          return pb - pa;
        });
        btn.textContent = '↕ Por precio';
      }
      rows.forEach(r => contenedor.appendChild(r));
    }

    async function cargarDatos() {
      try {
        const data = await fetchGitHub('ventas_totales.json');

        // Ordenar por total vendido
        const artistas = Object.entries(data)
          .sort((a, b) => b[1].total - a[1].total);

        const grandTotal = artistas.reduce((s, [, d]) => s + d.total, 0);

        document.getElementById('grandTotal').textContent = formatNum(grandTotal);
        document.getElementById('grandTotalBox').style.display = 'flex';

        let html = '';
        artistas.forEach(([nombre, datos], i) => {
          const id = i;
          const detalle = datos.detalle || [];
          const sinPrecio = datos.obras_vendidas - datos.obras_con_precio;

          html += `<div class="artista-item">
            <div class="artista-header" onclick="toggleArtista(${id})">
              <div class="artista-nombre">${nombre}</div>
              <div class="artista-right">
                <span class="artista-meta">${datos.obras_vendidas} obras</span>
                <span class="artista-total">${formatNum(datos.total)}</span>
                <span class="artista-arrow" id="arrow-${id}">▾</span>
              </div>
            </div>
            <div class="artista-obras" id="obras-${id}">`;

          html += `<div style="padding:4px 0 8px 16px;">
            <button onclick="toggleOrden(${id})" id="btn-orden-${id}" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;cursor:pointer;">↕ Por precio</button>
          </div>
          <div id="detalle-${id}">`;
          [...detalle]
            .sort((a, b) => b.precio_num - a.precio_num)
            .forEach(obra => {
              html += `<div class="obra-row">
                <span class="obra-titulo">${obra.titulo}</span>
                <span class="obra-precio">${formatNum(obra.precio_num)}</span>
              </div>`;
            });
          html += `</div>`;

          if (sinPrecio > 0) {
            html += `<div class="obra-row">
              <span class="obra-titulo" style="color:var(--text-dim);font-style:italic;">${sinPrecio} obra${sinPrecio !== 1 ? 's' : ''} sin precio registrado</span>
              <span class="obra-precio">—</span>
            </div>`;
          }

          html += `</div></div>`;
        });

        document.getElementById('listaArtistas').innerHTML = html || '<div class="empty">Sin datos</div>';

        // Última actualización
        const primeraFecha = artistas[0]?.[1]?.ultima_actualizacion || '—';
        document.getElementById('lastUpdate').textContent = `Última actualización: ${primeraFecha}`;

      } catch (e) {
        document.getElementById('listaArtistas').innerHTML = '<div class="empty">No hay datos disponibles. Ejecuta el cálculo de ventas primero.</div>';
        console.error(e);
      }
    }

    cargarDatos();
  </script>
</body>
</html>
